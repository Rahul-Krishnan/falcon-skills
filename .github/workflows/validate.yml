name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No setup-python step: these are stdlib-only and ubuntu-latest ships python3.
      - name: Test the validator
        run: python3 scripts/test_validate_structure.py
      - name: Validate plugin structure
        run: python3 scripts/validate_structure.py
