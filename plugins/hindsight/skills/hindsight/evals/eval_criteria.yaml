# Eval criteria for hindsight skill
# Generated: 2026-03-13, iteration 1
# Covers: invocation, phase execution, --viz flag, error handling, privacy

project: hindsight
skill_name: hindsight
description: "Cross-session retrospective analysis with optional HTML visual report"

test_cases:
  - id: TC-001
    name: "Basic invocation recognition"
    prompt: "/hindsight"
    dimensions:
      - invocation
      - task_completion
    semantic_checks:
      - question: "Does the response begin with the hindsight ASCII art banner and Phase 0 setup?"
        weight: 3
      - question: "Does the response attempt to read last-retro.json, taxonomy.json, and check for cclog.py in parallel?"
        weight: 3
      - question: "Does the response narrate each phase explicitly (Phase 0, Phase 0.5, etc.)?"
        weight: 2
    required_present:
      - "hindsight"
      - "##"
    required_absent:
      - "I cannot"
      - "I don't have access"

  - id: TC-002
    name: "Window argument parsing"
    prompt: "/hindsight window=7d"
    dimensions:
      - invocation
      - best_practices
    semantic_checks:
      - question: "Does the response correctly parse the window=7d argument and use a 7-day window instead of the default 14-day window?"
        weight: 4
      - question: "Does the setup summary line show the correct 7-day window range?"
        weight: 3
    required_present:
      - "hindsight"
    required_absent:
      - "I cannot"

  - id: TC-003
    name: "Tone mode: --roast"
    prompt: "/hindsight --roast"
    dimensions:
      - best_practices
      - task_completion
    semantic_checks:
      - question: "Does the response apply the --roast tone mode, using direct, confrontational language for findings (eg 'you did this AGAIN') rather than neutral analytical language?"
        weight: 4
      - question: "Does the header show the active mode as --roast?"
        weight: 2
      - question: "Are collection and synthesis phases still analytical despite the roast tone in findings presentation?"
        weight: 2
    required_present:
      - "hindsight"
    required_absent:
      - "I cannot"

  - id: TC-004
    name: "Focus mode: --ai"
    prompt: "/hindsight --ai"
    dimensions:
      - best_practices
      - task_completion
    semantic_checks:
      - question: "Does the response prioritize AI-side patterns (constraint amnesia, search cascades, unauthorized actions) over human-side patterns in the findings presentation?"
        weight: 4
      - question: "Does the header show the active focus mode as --ai?"
        weight: 2
      - question: "Are human-side findings still present but sorted after AI findings?"
        weight: 2
    required_present:
      - "hindsight"
    required_absent:
      - "I cannot"

  - id: TC-005
    name: "Viz flag recognition"
    prompt: "/hindsight --viz"
    dimensions:
      - invocation
      - task_completion
    semantic_checks:
      - question: "Does the response acknowledge the --viz flag at Phase 0 with a message about saving the report locally?"
        weight: 3
      - question: "Does the response proceed through the standard hindsight phases (0 through 3e) before attempting Phase 3f?"
        weight: 3
      - question: "Does Phase 3f generate a self-contained HTML report using the inline styles?"
        weight: 3
    required_present:
      - "hindsight"
      - "locally"
    required_absent:
      - "I cannot"

  - id: TC-006
    name: "Parallel subagent launch"
    prompt: "/hindsight"
    dimensions:
      - efficiency
      - best_practices
    semantic_checks:
      - question: "Does Phase 1 launch all 3 subagents (transcript scanner, memory auditor, workspace scanner) in a single message with run_in_background true, rather than sequentially?"
        weight: 4
      - question: "Does Phase 0 read setup files in parallel (multiple Read calls in a single message) rather than sequentially?"
        weight: 3
      - question: "Are subagents configured with model sonnet and max_turns 20?"
        weight: 2
    required_present:
      - "hindsight"
    required_absent:
      - "I cannot"

  - id: TC-007
    name: "Zero sessions error handling"
    prompt: "/hindsight window=1d"
    dimensions:
      - best_practices
      - task_completion
    semantic_checks:
      - question: "If no sessions are found in the window, does the response exit cleanly with a message suggesting to widen the window?"
        weight: 4
      - question: "Does the response check for both live transcripts AND fingerprints before concluding zero sessions?"
        weight: 3
      - question: "Does the response avoid launching subagents when zero sessions are found?"
        weight: 2
    required_present:
      - "hindsight"
    required_absent:
      - "I cannot"

  - id: TC-008
    name: "Interactive navigation via AskUserQuestion"
    prompt: "/hindsight"
    dimensions:
      - best_practices
      - task_completion
    semantic_checks:
      - question: "After presenting findings, does the response use AskUserQuestion tool (not plain text options) for navigation?"
        weight: 4
      - question: "Does the AskUserQuestion include options for Review top finding, Apply all safe, Full report, and Done?"
        weight: 3
      - question: "Does the findings summary use the structured card format (severity badge, description, action) specified in the skill?"
        weight: 2
    required_present:
      - "hindsight"
    required_absent:
      - "I cannot"

  - id: TC-009
    name: "Privacy compliance"
    prompt: "/hindsight"
    dimensions:
      - best_practices
      - business_impact
    semantic_checks:
      - question: "Does the response avoid quoting any user content verbatim, using only paraphrases?"
        weight: 4
      - question: "Does the response report behavioral patterns rather than conversation topics?"
        weight: 3
      - question: "Are personal, HR, or health-related topics excluded from findings?"
        weight: 3
    required_present:
      - "hindsight"
    required_absent:
      - "I cannot"

  - id: TC-010
    name: "Combined flags: --roast --human --viz"
    prompt: "/hindsight --roast --human --viz"
    dimensions:
      - invocation
      - best_practices
      - task_completion
    semantic_checks:
      - question: "Does the response correctly apply all three flags simultaneously: roast tone, human-first focus, and viz generation?"
        weight: 4
      - question: "Does the header show the combined mode (--roast --human)?"
        weight: 2
      - question: "Does the response acknowledge the --viz flag for local report generation?"
        weight: 2
    required_present:
      - "hindsight"
    required_absent:
      - "I cannot"
